<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INPUT PASSWORD.</title>
    <link rel="stylesheet" href="project_data_stylesheet.css">
</head>
<body>
    <div class="sys_warning">
        <h1>INPUT PASSWORD.</h1>
    </div>

    <div class="sys_password">
        <input type="password" id="passwordBox" placeholder="Password">
        <button onclick="checkPassword()">PROCEED</button>
    </div>
    <div class="sys_error">
        <p id="error">INSUFFICIENT.</p>
    </div>
    
    <script>
        function checkPassword() {

            const correctPassword = "HOME";
            const input = document.getElementById("passwordBox").value;

            if (input === correctPassword) {
                window.location.href = "real_index.html";
            } else {
                const error = document.getElementById("error");
                error.style.display = "block";

                setTimeout(() => {
                    error.style.display = "none";
                }, 2000);
            }

        }
    </script>
</body>
</html>
